<h2>Invoice List</h2>

<form [formGroup]="filterForm" class="filter-row">

  <mat-form-field appearance="outline" class="half">
    <mat-label>Invoice No</mat-label>
    <input matInput formControlName="invoiceNo">
  </mat-form-field>

  <mat-form-field appearance="outline" class="half">
    <mat-label>Customer</mat-label>
    <mat-select formControlName="customerId">
      <mat-option value="0">All</mat-option>
      <mat-option *ngFor="let c of customers" [value]="c.customerId">
        {{ c.customerName }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="half">
    <mat-label>From Date</mat-label>
    <input matInput [matDatepicker]="fromPicker" formControlName="fromDate">
    <mat-datepicker-toggle matIconSuffix [for]="fromPicker"></mat-datepicker-toggle>
    <mat-datepicker #fromPicker></mat-datepicker>
  </mat-form-field>

  <mat-form-field appearance="outline" class="half">
    <mat-label>To Date</mat-label>
    <input matInput [matDatepicker]="toPicker" formControlName="toDate">
    <mat-datepicker-toggle matIconSuffix [for]="toPicker"></mat-datepicker-toggle>
    <mat-datepicker #toPicker></mat-datepicker>
  </mat-form-field>

  <button mat-raised-button color="primary" style="margin-left: 2%;" (click)="loadInvoices()">
    Search
  </button>

</form>

<table mat-table [dataSource]="invoices" class="mat-elevation-z8">

  <ng-container matColumnDef="invoiceNo">
    <th mat-header-cell *matHeaderCellDef>Invoice No</th>
    <td mat-cell *matCellDef="let i">{{ i.invoiceNo }}</td>
  </ng-container>

  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef>Date</th>
    <td mat-cell *matCellDef="let i">{{ i.invoiceDate | date }}</td>
  </ng-container>

  <ng-container matColumnDef="customer">
    <th mat-header-cell *matHeaderCellDef>Customer</th>
    <td mat-cell *matCellDef="let i">{{ i.customerName }}</td>
  </ng-container>

  <ng-container matColumnDef="total">
    <th mat-header-cell *matHeaderCellDef>Total</th>
    <td mat-cell *matCellDef="let i">
      {{ i.grandTotal | number:'1.2-2' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let i">
      <button mat-icon-button color="primary" matTooltip="View Invoice" (click)="viewInvoice(i.invoiceId)">
        <mat-icon>visibility</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
