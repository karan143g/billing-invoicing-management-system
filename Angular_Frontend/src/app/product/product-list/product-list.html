<div class="page-header">
  <h2>Products</h2>
  <button mat-raised-button color="primary" class="actionbutton" (click)="openDialog()" *ngIf="canAddProduct" >
    Add Product
  </button>
</div>

<table mat-table [dataSource]="products" class="mat-elevation-z8">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Product</th>
    <td mat-cell *matCellDef="let p">{{ p.productName }}</td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>Price</th>
    <td mat-cell *matCellDef="let p">{{ p.price }}</td>
  </ng-container>

  <ng-container matColumnDef="gst">
    <th mat-header-cell *matHeaderCellDef>GST %</th>
    <td mat-cell *matCellDef="let p">{{ p.gstPercent }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let p">
      {{ p.isActive ? 'Active' : 'Inactive' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let p">
      <button mat-icon-button color="primary" matTooltip="Edit" (click)="openDialog(p)">
        <mat-icon>edit</mat-icon>
      </button>
        <button mat-icon-button color="warn" matTooltip="Delete" (click)="delete(p)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
